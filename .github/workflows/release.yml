name: Release images

# Builds and publishes the server, agent, and CLI container images to the GitHub
# Container Registry (GHCR).
#
#   push to main      -> tags: edge, sha-<short>
#   push tag v1.2.3   -> tags: 1.2.3, 1.2, 1, latest, sha-<short>
#   manual dispatch   -> tags: as above for the triggering ref
#
# No registry secrets are required: GHCR auth uses the built-in GITHUB_TOKEN.

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  # Grouped per ref: superseded edge builds on a branch (e.g. main) cancel so
  # only the newest commit's images are built. Tag releases each have a unique
  # ref, so they get their own group and are never cancelled mid-build.
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  images:
    name: Build, push & smoke-test
    runs-on: ubuntu-latest
    # Same tag rules for all three images; defined once and reused below.
    env:
      TAG_RULES: |
        type=ref,event=branch
        type=semver,pattern={{version}}
        type=semver,pattern={{major}}.{{minor}}
        type=semver,pattern={{major}}
        type=sha,prefix=sha-
        type=edge,branch=main
        type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # One metadata step per image (each has its own name/tags); bake-target
      # binds the generated tags+labels onto the matching bake target.
      - name: Metadata (server)
        id: meta-server
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/lotsman-server
          bake-target: server
          tags: ${{ env.TAG_RULES }}

      - name: Metadata (agent)
        id: meta-agent
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/lotsman-agent
          bake-target: agent
          tags: ${{ env.TAG_RULES }}

      - name: Metadata (cli)
        id: meta-cli
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/lotsman-cli
          bake-target: cli
          tags: ${{ env.TAG_RULES }}

      # Single bake invocation: the shared UI + Go build stages compile ONCE
      # and all three images are emitted and pushed. Go cross-compiles to each
      # platform (see Dockerfile), so there is no emulated compilation.
      - name: Build & push
        uses: docker/bake-action@v7
        with:
          files: |
            ./docker-bake.hcl
            cwd://${{ steps.meta-server.outputs.bake-file }}
            cwd://${{ steps.meta-agent.outputs.bake-file }}
            cwd://${{ steps.meta-cli.outputs.bake-file }}
          targets: server,agent,cli
          push: true
          provenance: false
          set: |
            *.args.VERSION=${{ steps.meta-server.outputs.version }}
            *.cache-from=type=gha,scope=lotsman
            *.cache-to=type=gha,mode=max,scope=lotsman

      # Resolve the immutable sha tag (matches docker/metadata's sha- prefix)
      # so Trivy and the smoke test scan the exact bytes just pushed.
      - name: Resolve image tag
        id: imgtag
        run: echo "sha=sha-${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      # Vulnerability scan of the just-built server image (the primary app;
      # agent/cli share the same base + Go build).
      #
      # NOTE: report-only (exit-code 0). The bake step above pushes every tag
      # (edge/latest/sha) atomically, so there is no pre-tag window in which to
      # hard-gate without splitting build/push into separate steps. Failing here
      # would go red only *after* the tags are already public, so we surface the
      # findings without breaking releases. Tighten to exit-code 1 once the
      # build and push are decoupled.
      - name: Scan server image (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/lotsman-server:${{ steps.imgtag.outputs.sha }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table
          exit-code: "0"

      # Pull each just-pushed image (amd64 on this runner) and run its version
      # command, so a broken image can never get tagged :latest / :edge.
      - name: Smoke test images
        run: |
          set -euo pipefail
          owner="${{ github.repository_owner }}"
          short="${GITHUB_SHA:0:7}"
          for img in server agent cli; do
            ref="ghcr.io/${owner}/lotsman-${img}:sha-${short}"
            echo "::group::smoke ${img} (${ref})"
            docker pull -q "$ref"
            if [ "$img" = "cli" ]; then
              out="$(docker run --rm "$ref" version)"
            else
              out="$(docker run --rm "$ref" --version)"
            fi
            echo "$out"
            echo "$out" | grep -q "lotsman" || { echo "::error::smoke test failed for ${img}"; exit 1; }
            echo "::endgroup::"
          done
