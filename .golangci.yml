# golangci-lint configuration (schema v2).
#
# Conservative, green-on-arrival linter set: the standard bundle
# (errcheck, govet, ineffassign, staticcheck, unused) plus gofmt/goimports
# formatting checks. No opinionated style linters yet — tighten over time.
version: "2"

linters:
  default: standard
  settings:
    staticcheck:
      # Keep real-bug analyses (SA*) on; silence the purely stylistic
      # refactor suggestions that current code trips (De Morgan / embedded
      # field selectors). These are safe to revisit later.
      checks:
        - all
        - -QF1001 # could apply De Morgan's law
        - -QF1008 # could remove embedded field from selector
  exclusions:
    presets:
      # Unchecked deferred Close()/Flush()/print* — idiomatic, not bugs.
      - std-error-handling
    paths:
      # The UI toolchain vendors a stray Go file under node_modules (flatted);
      # it isn't ours and isn't present in CI's Go job. Never lint it.
      - ui/node_modules
    rules:
      # Test helpers legitimately ignore w.Write returns and use
      # comparison-style assertions.
      - path: _test\.go
        linters:
          - errcheck
          - staticcheck
      # redact.placeholder is retained for the upcoming redaction work (SEC-2);
      # keep the const rather than churn a file another wave owns.
      - path: internal/redact/redact\.go
        linters:
          - unused

formatters:
  enable:
    - gofmt
    - goimports
