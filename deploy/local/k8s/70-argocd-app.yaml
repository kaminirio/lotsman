# ArgoCD Application syncing the public guestbook example into ns demo.
# The lotsman argocd adapter matches by destination namespace (demo), so once
# this app has real .status.history, a `change` signal (source argocd) appears
# in the demo/checkout investigation timeline.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: checkout-guestbook
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/argoproj/argocd-example-apps
    targetRevision: HEAD
    path: guestbook
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
