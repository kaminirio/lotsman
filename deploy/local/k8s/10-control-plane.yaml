apiVersion: apps/v1
kind: Deployment
metadata:
  name: lotsman-control-plane
  namespace: lotsman
  labels:
    app: lotsman-control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lotsman-control-plane
  template:
    metadata:
      labels:
        app: lotsman-control-plane
    spec:
      containers:
        - name: control-plane
          image: lotsman-server:dev
          imagePullPolicy: IfNotPresent
          env:
            - name: LOTSMAN_ADDR
              value: ":8080"
            - name: LOTSMAN_GATEWAY_ADDR
              value: ":9090"
            - name: LOTSMAN_AGENT_TOKEN
              value: "dev-token"
            # Optional LLM incident-explainer (see 80-ollama.yaml). Points at the
            # in-cluster Ollama service; if Ollama is absent/not ready the explain
            # endpoint just returns 503/502 until it comes up — nothing else breaks.
            - name: LOTSMAN_LLM_URL
              value: "http://ollama.lotsman.svc:11434"
            - name: LOTSMAN_LLM_MODEL
              value: "gemma3:4b"
            # Disable the demo seed data (sample clusters prod-eu/staging + sample
            # incident) so the cluster list shows only actually-connected clusters.
            - name: LOTSMAN_SEED
              value: "0"
            # No LOTSMAN_DIRECT_MODE -> agent mode.
            # No LOTSMAN_DATABASE_URL -> in-memory store (no seed; see LOTSMAN_SEED).
          ports:
            - name: api
              containerPort: 8080
            - name: gateway
              containerPort: 9090
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: lotsman-control-plane
  namespace: lotsman
  labels:
    app: lotsman-control-plane
spec:
  selector:
    app: lotsman-control-plane
  ports:
    - name: api
      port: 8080
      targetPort: 8080
    - name: gateway
      port: 9090
      targetPort: 9090
