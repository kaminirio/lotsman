# Crash-looping demo workload in ns demo, labeled app=checkout.
# The container prints error log lines, then exits non-zero -> kubelet emits
# repeated Warning BackOff/Failed events that the kubernetes adapter escalates
# to SeverityError. Logs (stdout) are shipped to Loki by alloy (50-alloy.yaml).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout
  namespace: demo
  labels:
    app: checkout
spec:
  replicas: 1
  selector:
    matchLabels:
      app: checkout
  template:
    metadata:
      labels:
        app: checkout
    spec:
      containers:
        - name: checkout
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "level=info msg=\"checkout starting\" app=checkout"
              echo "level=error msg=\"failed to connect to payments-db: connection refused\" app=checkout"
              echo "level=error msg=\"checkout transaction aborted\" app=checkout"
              echo "panic: checkout fatal error, exiting non-zero"
              sleep 3
              exit 1
