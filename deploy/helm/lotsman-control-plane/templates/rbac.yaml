{{- if and .Values.config.directMode .Values.rbac.create }}
# directMode: the control plane reads the local cluster in-process via the
# Kubernetes adapter, so it needs the same cluster-read grants the agent uses.
# In agent mode this whole file is skipped — the agent carries the RBAC instead.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "lotsman-control-plane.fullname" . }}
  labels:
    {{- include "lotsman-control-plane.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["events", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "lotsman-control-plane.fullname" . }}
  labels:
    {{- include "lotsman-control-plane.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "lotsman-control-plane.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "lotsman-control-plane.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
