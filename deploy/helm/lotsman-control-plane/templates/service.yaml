apiVersion: v1
kind: Service
metadata:
  name: {{ include "lotsman-control-plane.fullname" . }}
  labels:
    {{- include "lotsman-control-plane.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "lotsman-control-plane.selectorLabels" . | nindent 4 }}
  ports:
    - name: api
      port: {{ .Values.service.apiPort }}
      targetPort: api
    {{- if not .Values.config.directMode }}
    - name: gateway
      port: {{ .Values.service.gatewayPort }}
      targetPort: gateway
    {{- end }}
