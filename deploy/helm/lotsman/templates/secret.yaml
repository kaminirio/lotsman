{{- if not .Values.secret.existingSecret }}
{{- /*
  Fail closed (SEC-1): the gateway refuses to start without a real agent token,
  so require one whenever we render a chart-managed Secret and either component
  that needs it is enabled. Supply `secret.agentToken` or point at an
  `secret.existingSecret`.
*/}}
{{- if and (or .Values.controlPlane.enabled .Values.agent.enabled) (not .Values.secret.agentToken) }}
{{- fail "secret.agentToken is required (generate with `openssl rand -hex 32`) or set secret.existingSecret. The agent gateway is fail-closed without it (SEC-1)." }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "lotsman.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lotsman.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secret.agentToken }}
  {{ .Values.secret.keys.agentToken }}: {{ .Values.secret.agentToken | quote }}
  {{- end }}
  {{- if .Values.secret.databaseUrl }}
  {{ .Values.secret.keys.databaseUrl }}: {{ .Values.secret.databaseUrl | quote }}
  {{- end }}
  {{- if .Values.secret.ssoConfig }}
  {{ .Values.secret.keys.ssoConfig }}: {{ .Values.secret.ssoConfig | quote }}
  {{- end }}
  {{- if .Values.secret.argocdToken }}
  {{ .Values.secret.keys.argocdToken }}: {{ .Values.secret.argocdToken | quote }}
  {{- end }}
{{- end }}
